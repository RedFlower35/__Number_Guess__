<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猜數字遊戲 - Number Guessing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Decorative background elements -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="game-container">
    <header class="game-header">
      <h1 class="gradient-text">猜數字遊戲</h1>
      <p class="subtitle">挑戰你的直覺，在 10 次機會內找出目標數字！</p>
    </header>

    <main class="game-card">
      <!-- Game status dashboard -->
      <div class="dashboard">
        <div class="stat-box">
          <span class="stat-label">當前區間</span>
          <span id="range-display" class="stat-value">1 - 100</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">剩餘次數</span>
          <span id="attempts-display" class="stat-value">10</span>
        </div>
      </div>

      <!-- Attempt progress bar -->
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar" style="width: 100%"></div>
      </div>

      <!-- Message box -->
      <div class="message-container">
        <p id="message" class="game-message">請輸入 1 到 100 之間的數字開始遊戲</p>
      </div>

      <!-- Input and Controls -->
      <div class="controls-area">
        <form id="guess-form" class="guess-form">
          <div class="input-wrapper">
            <input 
              type="number" 
              id="guess-input" 
              min="1" 
              max="100" 
              placeholder="輸入 1-100" 
              required
              autocomplete="off"
            >
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary">
            <span>確認</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
          </button>
        </form>

        <button id="reset-btn" class="btn btn-success hidden">
          <span>重新開始</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="btn-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        </button>
      </div>

      <!-- History log -->
      <div id="history-section" class="history-section hidden">
        <h3 class="history-title">猜測紀錄</h3>
        <div id="history-list" class="history-list">
          <!-- History items will be inserted here dynamically -->
        </div>
      </div>
    </main>

    <footer class="game-footer">
      <p>基於 Google AI Studio 專案轉換 • 現代化網頁版</p>
    </footer>
  </div>

  <!-- Confetti Canvas for celebration -->
  <canvas id="confetti-canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
